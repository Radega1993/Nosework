# Traefik v1 (frontend.*). Host por defecto: nosework.radega.com — define TRAEFIK_HOST en .env.production si usas otro dominio.
# Red externa `web` debe existir: docker network create web
version: "3"

services:
  web:
    container_name: app-nosework
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nosework.radega.com}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nosework.radega.com}
      SQLITE_DATABASE_PATH: /data/database.db
      NOMINATIM_CONTACT_EMAIL: ${NOMINATIM_CONTACT_EMAIL:-}
    volumes:
      - nosework_sqlite:/data
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.frontend.rule=Host:${TRAEFIK_HOST:-nosework.radega.com}
      - traefik.port=3000
      - traefik.docker.network=web
      - traefik.frontend.protocol=http
      - traefik.frontend.entryPoints=http,https
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/events',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  nosework_sqlite:

networks:
  web:
    external: true
